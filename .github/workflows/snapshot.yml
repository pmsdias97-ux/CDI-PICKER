name: Snapshot evolução

# Gatilho fiável para os snapshots da evolução (independente do cron da Vercel,
# que no plano Hobby só corre 1×/dia). Corre 2×/dia durante o mercado dos EUA:
#   - 16:00 UTC (~meio da sessão)
#   - 21:00 UTC (~pós-fecho)
# Cada corrida grava um ponto por "slot" (hora), por isso dá 2 pontos/dia e um
# re-run no mesmo slot não duplica. Também pode ser disparado à mão.
# Requer o segredo CRON_SECRET nos GitHub Secrets do repositório
# (Settings > Secrets and variables > Actions > New repository secret),
# com o MESMO valor que está na Vercel e no .env.local.

on:
  schedule:
    - cron: "0 16 * * *"
    - cron: "0 21 * * *"
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger snapshot endpoint
        run: |
          code=$(curl -s -o /tmp/out.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://cdi-picker.vercel.app/api/cron/snapshot)
          echo "HTTP $code"
          cat /tmp/out.txt; echo
          test "$code" = "200"
