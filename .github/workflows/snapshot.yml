name: Snapshot evolução

# Gatilho fiável para os snapshots da evolução (independente do cron da Vercel,
# que no plano Hobby só corre 1×/dia). Corre DE HORA A HORA, em dias úteis, na
# janela 14:00–21:00 UTC — que cobre o mercado aberto tanto no horário de verão
# (EDT, 13:30–20:00 UTC) como de inverno (EST, 14:30–21:00 UTC).
# O próprio endpoint só grava com o mercado ABERTO (guarda usMarketOpen: dias úteis,
# horas de sessão, exclui feriados e respeita os meios-dias). Por isso as horas fora
# de sessão (ex.: 14:00 em EST, 21:00 em EDT) são simplesmente ignoradas — resultam
# ~7 pontos/dia, sem chamar a API com o mercado fechado.
# Cada corrida grava um ponto por "slot" (hora); um re-run no mesmo slot não duplica.
# Também pode ser disparado à mão (workflow_dispatch).
# Requer o segredo CRON_SECRET nos GitHub Secrets do repositório
# (Settings > Secrets and variables > Actions > New repository secret),
# com o MESMO valor que está na Vercel e no .env.local.

on:
  schedule:
    - cron: "0 14-21 * * 1-5"
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger snapshot endpoint
        run: |
          code=$(curl -s -o /tmp/out.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://cdi-picker.vercel.app/api/cron/snapshot)
          echo "HTTP $code"
          cat /tmp/out.txt; echo
          test "$code" = "200"
