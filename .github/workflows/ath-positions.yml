name: ATH — posições (leve, 30/30 min)

# Passagem LEVE: atualiza SÓ o preço + fecho anterior dos tickers que os MEMBROS têm
# (~2 pedidos bulk ao Yahoo, nada de fast_info/.info). Corre nos slots :30, para preencher
# o intervalo entre as corridas horárias do ath-prices → cotações das posições ~de 30 em 30 min
# durante a sessão US, sem carga extra relevante nas APIs. Segredos: CRON_SECRET, SUPABASE_URL, SUPABASE_ANON_KEY.

on:
  schedule:
    - cron: "30 13-20 * * 1-5"   # 13:30–20:30 UTC, dias úteis (entre as corridas horárias :00)
  workflow_dispatch:

concurrency:
  group: ath-positions
  cancel-in-progress: true

jobs:
  positions:
    runs-on: ubuntu-latest
    timeout-minutes: 10   # backstop: só posições, é rápido
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/ath/requirements.txt
      - run: pip install -r scripts/ath/requirements.txt
      - run: python scripts/ath/fetch_ath.py --mode positions
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
